apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-guardian-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-guardian
  template:
    metadata:
      labels:
        app: ai-guardian
  specifications:
    securityContext:
        runAsNonRoot: true
        'allowPrivilegeEscalation' : false
    containers:
      - name: ai-guardian
        image: srigiriraja/ai-guardian:latest
        ports:
        - containerPort: 8001
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"